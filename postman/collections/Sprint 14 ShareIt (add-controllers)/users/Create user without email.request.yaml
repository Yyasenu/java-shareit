$kind: http-request
url: localhost:8080/users
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
        "name": "{{userName}}"
    }
scripts:
  - type: beforeRequest
    code: "const main = async () => {\r

      \    const api = new API(pm);\r

      \    const rnd = new RandomUtils();\r

      \r

      \    try {\r

      \        user2 = rnd.getUser();\r

      \        pm.collectionVariables.set(\"userName\", user2.name);\r

      \        pm.collectionVariables.set(\"userEmail\", user2.email);\r

      \    } catch(err) {\r

      \        console.error(\"Ошибка при подготовке тестовых данных.\", err);\r

      \    }\r

      \r

      };\r

      \r

      const interval = setInterval(() => {}, 1000);\r

      \r

      setTimeout(async () => \r

      \    {\r

      \        try {\r

      \            await main();\r

      \        } catch (e) {\r

      \            console.error(e);\r

      \        } finally {\r

      \            clearInterval(interval);\r

      \        }\r

      \    },  \r

      \    100 \r

      );"
    language: text/javascript
  - type: afterResponse
    code: "pm.test(\"Status code is 400\", function () {\r

      \    pm.expect(pm.response.code).to.be.oneOf([400, 500]);\r

      });\r

      pm.test(\"Response have body\", function () {\r

      \    pm.response.to.be.withBody;\r

      \    pm.response.to.be.json;\r

      });\r\n"
    language: text/javascript
order: 2000
